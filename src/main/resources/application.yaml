spring:
  application:
    name: server
  config:
    import: optional:classpath:application-secret.yaml
  profiles:
    active: local
  forward-headers-strategy: framework
  datasource:
    url: jdbc:mysql://localhost:3306/CertiFolio?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://ec2-3-35-37-53.ap-northeast-2.compute.amazonaws.com/login/oauth2/code/google"
            scope:
              - email
              - profile
          naver:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://ec2-3-35-37-53.ap-northeast-2.compute.amazonaws.com/login/oauth2/code/naver"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
          kakao:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://ec2-3-35-37-53.ap-northeast-2.compute.amazonaws.com/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - profile_image
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  expiration: 3600000 # 1 hour

app:
  oauth2:
    redirect-uri: http://ec2-3-35-37-53.ap-northeast-2.compute.amazonaws.com/auth/callback
    authorized-redirect-uris:
      - http://ec2-3-35-37-53.ap-northeast-2.compute.amazonaws.com/auth/callback

gemini:
  api:
    key: ${GEMINI_API_KEY}