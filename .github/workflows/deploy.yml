name: Spring Boot Deploy to EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때만 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 백엔드 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Java 21 세팅
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 3. application-secret.yml 만들기
        run: |
          mkdir -p ./src/main/resources
          touch ./src/main/resources/application-secret.yml
          echo "${{ secrets.APPLICATION_SECRET_YML }}" > ./src/main/resources/application-secret.yml
        shell: bash

      - name: 4. Spring Boot 빌드 (.jar 파일 만들기)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: 5. 완성된 파일을 EC2의 백엔드 폴더로 전달
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "~/backend"
          strip_components: 2

      - name: 6. EC2 접속 후 기존 서버 끄고 새 서버 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/backend
            
            # 기존에 돌아가던 8080 포트 프로세스 강제 종료
            sudo fuser -k -n tcp 8080 || true
            sleep 3
            
            # .env 파일이 존재하면 환경 변수로 로드
            if [ -f .env ]; then
              echo "✅ .env 파일을 찾았습니다. 환경 변수를 로드합니다."
              set -a
              source .env
              set +a
            else
              echo "⚠️ .env 파일이 없습니다. 환경 변수 로드를 건너뜁니다."
            fi
            
            # 새 버전의 애플리케이션 백그라운드 실행
            nohup java -jar *.jar > server.log 2>&1 &