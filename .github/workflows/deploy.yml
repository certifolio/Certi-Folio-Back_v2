name: Spring Boot Deploy to EC2

on:
  push:
    branches: [ "dev" ] # dev 브랜치에 푸시될 때만 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 백엔드 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Java 21 세팅
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: 3. application-secret.yaml 생성
        env:
          APPLICATION_SECRET_YAML: ${{ secrets.APPLICATION_SECRET_YAML }}
        run: echo "$APPLICATION_SECRET_YAML" > src/main/resources/application-secret.yaml

      - name: 4. Spring Boot 빌드 (.jar 파일 만들기)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: 5. 기존 서버 종료 (파일 잠금 해제)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            sudo fuser -k -n tcp 8080 || true
            sleep 3

      - name: 6. 새 JAR 파일을 EC2로 전달
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "build/libs/*[!plain].jar"
          target: "~/backend"
          strip_components: 2

      - name: 7. 새 서버 실행
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd ~/backend

            # .env 파일이 존재하면 환경 변수로 로드
            if [ -f .env ]; then
              set -a
              source .env
              set +a
            fi

            # 새 버전의 애플리케이션 백그라운드 실행
            nohup java -Xmx512m -jar $(ls *.jar | grep -v plain) > server.log 2>&1 &
